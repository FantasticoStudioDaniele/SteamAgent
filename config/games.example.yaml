# Game catalog of your Steam partner account.
#
# You do NOT need to fill it in by hand: it's generated automatically by
#   uv run steam-agent setup
# or
#   uv run steam-agent collect-games
# which read the list from https://partner.steamgames.com/apps/ and save it to
# config/games.yaml (this .example file is only a format reference).
games:
  - appid: 440
    name: Team Fortress 2
  - appid: 570
    name: Dota 2
