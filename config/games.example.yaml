# Catalogo giochi del tuo account Steam partner.
#
# NON serve compilarlo a mano: viene generato automaticamente da
#   uv run steam-agent setup
# oppure
#   uv run steam-agent collect-games
# che leggono la lista da https://partner.steamgames.com/apps/ e la salvano in
# config/games.yaml (questo file .example è solo un riferimento di formato).
games:
  - appid: 440
    name: Team Fortress 2
  - appid: 570
    name: Dota 2
