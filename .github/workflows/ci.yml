name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: lint & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        # --all-extras pulls in the dashboard extra (pandas) needed by the tests.
        # No `playwright install` step: the test suite never launches a browser.
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run ruff check src dashboard tests

      - name: Test (pytest)
        run: uv run pytest -q
